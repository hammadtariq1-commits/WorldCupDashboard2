<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>FIFA World Cup 2026</title>
<meta name="description" content="FIFA World Cup 2026 — live matches, knockout bracket, predictions and Golden Boot, all in Qatar time.">
<meta name="theme-color" content="#00e0a8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FIFA WC 2026">
<meta property="og:title" content="FIFA World Cup 2026">
<meta property="og:description" content="Matches, live data, predictions and knockout path — all in Qatar time.">
<meta property="og:type" content="website">
<style>
:root{
  --bg:#eef3fb; --bg2:#e4ebf6; --panel:#ffffff; --panel2:#f5f8fd; --line:#dde5f1; --line2:#c9d5e8;
  --ink:#0b1426; --muted:#4a5a76; --faint:#8494b0;
  --pink:#ff2d78; --purple:#8b5cf6; --teal:#00e0a8; --blue:#3b82f6; --gold:#ffc23c; --orange:#ff8a3d;
  --green:#22e07a; --red:#ff5a6a; --grey:#5b6b88;
  --grad:linear-gradient(120deg,#00e0a8 0%,#3b82f6 100%);
  --grad-hot:linear-gradient(120deg,#ff2d78 0%,#8b5cf6 55%,#3b82f6 100%);
  --grad-gold:linear-gradient(120deg,#ffc23c 0%,#ff8a3d 100%);
  --grad-champ:linear-gradient(120deg,#8b5cf6 0%,#ec4899 100%);
  --grad-red:linear-gradient(120deg,#ff5a6a 0%,#ff8a3d 100%);
  --grad-blue:linear-gradient(120deg,#3b82f6 0%,#8b5cf6 100%);
  --shadow:0 12px 32px rgba(24,48,96,.12);
  --glow-teal:0 0 0 1px rgba(0,224,168,.45),0 10px 30px rgba(0,224,168,.18);
  --radius:18px; --radius-s:12px; --maxw:1300px;
}
/* Light is the standard theme for everyone. Keep a dark media query so OS-dark viewers keep the light chrome. */
@media (prefers-color-scheme: dark){
  :root{ color-scheme:light; }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 620px at 82% -8%, rgba(139,92,246,.20), transparent 60%),
    radial-gradient(1000px 520px at -8% 6%, rgba(0,224,168,.16), transparent 55%),
    radial-gradient(900px 500px at 50% 120%, rgba(255,45,120,.12), transparent 60%),
    var(--bg);
  color:var(--ink);
  font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  line-height:1.5; -webkit-font-smoothing:antialiased; letter-spacing:.1px; overflow-x:hidden;
}
a{color:var(--blue); text-decoration:none} a:hover{text-decoration:underline}
.wrap{max-width:var(--maxw); margin:0 auto; padding:0 18px}
.small{font-size:12px} .muted{color:var(--muted)} .faint{color:var(--faint)}
button{font-family:inherit; cursor:pointer}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,224,122,.45)}70%{box-shadow:0 0 0 9px rgba(34,224,122,0)}100%{box-shadow:0 0 0 0 rgba(34,224,122,0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* pitch pattern */
.pitch{position:relative}
.pitch::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;opacity:.5;
  background:repeating-linear-gradient(100deg,rgba(0,224,168,.05) 0 42px,transparent 42px 84px);}

/* ---------- Top bar ---------- */
.topbar{position:sticky; top:0; z-index:50; backdrop-filter:blur(14px);
  background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,255,255,.80)); border-bottom:1px solid var(--line)}
.topbar .row{display:flex; align-items:center; gap:14px; padding:11px 18px; max-width:var(--maxw); margin:0 auto; flex-wrap:wrap}
.brand{display:flex; align-items:center; gap:13px; min-width:0}
.badge-cup{width:46px;height:46px;border-radius:14px;background:var(--grad-hot);display:grid;place-items:center;
  font-size:24px; box-shadow:var(--shadow); flex:none; animation:floaty 4s ease-in-out infinite}
.brand h1{font-size:18px; margin:0; line-height:1.05; font-weight:800; letter-spacing:.2px}
.brand p{margin:2px 0 0; font-size:11.5px; color:var(--muted)}
.tb-spacer{flex:1}
.feedpill{display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px;
  border:1px solid var(--line); background:var(--panel); font-size:12px; font-weight:700}
.dot{width:9px;height:9px;border-radius:50%;background:var(--grey)}
.dot.live{background:var(--green); animation:pulse 1.6s infinite}
.dot.delayed{background:var(--gold)} .dot.failed{background:var(--red)} .dot.manual{background:var(--blue)}
.btn{border:1px solid var(--line); background:var(--panel); color:var(--ink); padding:9px 14px;
  border-radius:11px; font-size:12.5px; font-weight:700; display:inline-flex; gap:7px; align-items:center; transition:.15s}
.btn:hover{border-color:var(--teal); transform:translateY(-1px)}
.btn.primary{background:var(--grad); border:none; color:#04140f}
.refresh-meta{font-size:11px; color:var(--muted); white-space:nowrap}

/* ---------- Nav ---------- */
.nav{display:flex; gap:4px; overflow-x:auto; padding:6px 18px 0; max-width:var(--maxw); margin:0 auto; scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav a{color:var(--muted); font-size:13px; font-weight:700; padding:10px 14px; border-radius:11px 11px 0 0; white-space:nowrap; border-bottom:2px solid transparent}
.nav a:hover{color:var(--ink); text-decoration:none}
.nav a.active{color:var(--ink); border-bottom-color:var(--teal); background:linear-gradient(180deg,rgba(0,224,168,.10),transparent)}

/* ---------- Hero ---------- */
.hero{margin-top:16px; border-radius:var(--radius); overflow:hidden; border:1px solid var(--line);
  background:linear-gradient(120deg,rgba(255,45,120,.16),rgba(139,92,246,.13) 45%,rgba(59,130,246,.14));
  box-shadow:var(--shadow); position:relative}
.hero .inner{padding:30px 26px; display:flex; align-items:center; gap:26px; flex-wrap:wrap}
.hero h2{margin:0; font-size:34px; font-weight:900; letter-spacing:.3px; line-height:1.02;
  background:linear-gradient(120deg,#0b1426,#3b82f6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero p{margin:8px 0 0; color:var(--muted); font-size:14.5px}
.hero .tro{font-size:96px; line-height:1; filter:drop-shadow(0 10px 22px rgba(255,194,60,.5)); animation:floaty 5s ease-in-out infinite}
.hero-flags{display:inline-flex;align-items:center;gap:6px;margin-inline-start:6px}
@media(max-width:560px){ .hero .tro{font-size:64px} .hero h2{font-size:25px} }
.hero-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.htag{font-size:11px;font-weight:800;letter-spacing:.4px;padding:5px 11px;border-radius:999px;border:1px solid var(--line2);background:rgba(11,20,38,.04)}

/* ---------- Filters ---------- */
.filters{display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:14px 0}
.filters select, .filters input{background:var(--panel); color:var(--ink); border:1px solid var(--line);
  border-radius:11px; padding:10px 12px; font-size:12.5px; font-family:inherit; min-width:0}
.filters input.search{flex:1; min-width:200px}
.filters input.search:focus,.filters select:focus{outline:none;border-color:var(--teal)}
.seg{display:inline-flex; background:var(--panel); border:1px solid var(--line); border-radius:11px; overflow:hidden}
.seg button{background:transparent; border:none; color:var(--muted); padding:9px 13px; font-size:12px; font-weight:700}
.seg button.on{background:var(--grad); color:#04140f}
.switch{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);font-weight:700}
.switch input{appearance:none;width:40px;height:23px;background:var(--line2);border-radius:999px;position:relative;cursor:pointer;transition:.2s;flex:none}
.switch input:checked{background:var(--teal)}
.switch input::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s}
.switch input:checked::after{left:18px}

/* ---------- Layout ---------- */
main{padding:6px 0 60px}
.grid{display:grid; gap:14px}
.cards-6{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.cards-4{grid-template-columns:repeat(auto-fit,minmax(230px,1fr))}
.cards-kpi{grid-template-columns:repeat(auto-fit,minmax(272px,1fr))}
.cards-3{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.cards-2{grid-template-columns:repeat(auto-fit,minmax(360px,1fr))}
.panel{background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--line);
  border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); animation:fadeUp .4s ease both}
.section-h{display:flex; align-items:center; justify-content:space-between; gap:10px; margin:24px 0 12px}
.section-h h2{font-size:17px; margin:0; letter-spacing:.2px; display:flex; align-items:center; gap:9px}
.section-h h2 .ic{font-size:19px}

/* KPI */
.kpi{position:relative; overflow:hidden; transition:.18s; cursor:default; padding:20px 19px; min-height:132px}
.kpi:hover{transform:translateY(-4px); border-color:var(--line2)}
.kpi .lab{font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); font-weight:800; display:flex; align-items:center; gap:6px}
.kpi .val{font-size:26px; font-weight:900; margin-top:10px; line-height:1.12}
.kpi .sub{font-size:12.5px; color:var(--muted); margin-top:6px; line-height:1.35}
.kpi-teams{display:inline-flex;flex-wrap:wrap;align-items:center;gap:7px;font-size:16px;font-weight:800}
.kpi-teams .flag{vertical-align:middle}
.kpi.hot{background:var(--grad-hot); border:none; color:#fff}
.kpi.hot .lab,.kpi.hot .sub{color:rgba(255,255,255,.88)}
.kpi.tealg{background:var(--grad); border:none; color:#04140f}
.kpi.tealg .lab,.kpi.tealg .sub{color:rgba(4,20,15,.74)}
.kpi.goldg{background:var(--grad-gold); border:none; color:#2a1800}
.kpi.goldg .lab,.kpi.goldg .sub{color:rgba(42,24,0,.74)}
.kpi.champg{background:var(--grad-champ); border:none; color:#fff}
.kpi.champg .lab,.kpi.champg .sub{color:rgba(255,255,255,.88)}
.kpi.redg{background:var(--grad-red); border:none; color:#fff}
.kpi.redg .lab,.kpi.redg .sub{color:rgba(255,255,255,.9)}
.kpi.blueg{background:var(--grad-blue); border:none; color:#fff}
.kpi.blueg .lab,.kpi.blueg .sub{color:rgba(255,255,255,.88)}
.kpi .big-emoji{position:absolute; right:10px; bottom:2px; font-size:56px; opacity:.18}
/* player avatar placeholder */
.avatar{display:inline-grid; place-items:center; border-radius:50%; color:#fff; font-weight:900;
  position:relative; flex:none; box-shadow:0 5px 14px rgba(0,0,0,.4); border:2px solid rgba(255,255,255,.18); letter-spacing:.3px}
.avatar .fbadge{position:absolute; bottom:-4px; right:-5px; line-height:0}
.avatar .fbadge .flag{border:1.5px solid rgba(0,0,0,.5)}
.playerrow{display:flex; align-items:center; gap:11px; min-width:0}
.playerrow b{font-size:14px}

/* ---------- Team badge (flag + code + name + geo-locator) ---------- */
.tbadge{display:inline-flex; align-items:center; gap:8px; min-width:0}
.flag{display:inline-block; border-radius:4px; border:1px solid rgba(255,255,255,.22); box-shadow:0 1px 3px rgba(0,0,0,.4); flex:none}
.flag.ph{background:var(--line)}
.tc{font-weight:900; font-size:12px; letter-spacing:.5px; flex:none}
.tn{font-weight:700; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.grp{font-size:9.5px;font-weight:800;letter-spacing:.4px;color:var(--faint);border:1px solid var(--line);border-radius:999px;padding:2px 6px;flex:none}
.globe{flex:none; vertical-align:middle}

/* ---------- Match cards ---------- */
.match{display:flex; flex-direction:column; gap:11px; transition:.18s; cursor:pointer; position:relative; overflow:hidden}
.match:hover{transform:translateY(-3px); box-shadow:var(--glow-teal); border-color:var(--teal)}
.match.done{border-color:rgba(34,224,122,.5); background:linear-gradient(180deg,rgba(34,224,122,.10),var(--panel2))}
.match.done::before{content:""; position:absolute; inset:0 auto 0 0; width:5px; background:var(--green)}
.match.done:hover{border-color:var(--green)}
.donebadge{font-size:10.5px; font-weight:900; letter-spacing:.4px; padding:4px 10px; border-radius:999px;
  background:var(--green); color:#04140f; display:inline-flex; align-items:center; gap:5px}
.match .top{display:flex; justify-content:space-between; align-items:center; gap:8px}
.stage-chip{font-size:10px; font-weight:900; letter-spacing:.7px; text-transform:uppercase; color:#04140f;
  background:var(--grad); padding:4px 9px; border-radius:999px}
.stage-chip.ko{background:var(--grad-gold); color:#2a1800}
.stage-chip.big{background:var(--grad-champ); color:#fff}
.teamrow{display:flex; align-items:center; justify-content:space-between; gap:10px}
.side{display:flex; align-items:center; gap:9px; min-width:0}
.score{font-weight:900; font-size:22px; min-width:24px; text-align:center}
.score.dim{color:var(--faint); font-weight:800}
.pens{font-size:11px;color:var(--muted);font-weight:700}
.metarow{display:flex; flex-wrap:wrap; gap:6px 14px; font-size:12px; color:var(--muted)}
.metarow b{color:var(--ink); font-weight:700}
.qatar{color:var(--teal); font-weight:800}
.statuschip{font-size:10.5px;font-weight:900;padding:4px 9px;border-radius:999px;letter-spacing:.4px; display:inline-flex; align-items:center; gap:5px}
.st-ft{background:rgba(91,107,136,.2);color:var(--muted)}
.st-live{background:rgba(34,224,122,.16);color:var(--green)}
.st-sched{background:rgba(59,130,246,.16);color:#7fb0ff}
.st-today{background:rgba(255,194,60,.18);color:var(--gold)}
.blink{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite}
.prob-mini{display:flex;height:10px;border-radius:999px;overflow:hidden;background:var(--line)}
.prob-mini i{display:block;height:100%}
.prob-legend{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px;font-weight:600}
.watchers{display:flex;flex-wrap:wrap;gap:6px}
.wchip{font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:3px 9px;color:var(--muted)}

/* ---------- Source chip ---------- */
.src{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:var(--faint);
  border:1px dashed var(--line2);border-radius:999px;padding:3px 9px}
.src b{color:var(--muted);font-weight:700}
.srcbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px}
.est-tag{font-size:9.5px;font-weight:900;letter-spacing:.4px;color:var(--purple);background:rgba(139,92,246,.14);border:1px solid rgba(139,92,246,.35);border-radius:999px;padding:2px 8px}

/* ---------- Tables ---------- */
.tablewrap{overflow:auto; border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
table{width:100%; border-collapse:collapse; font-size:13px}
th,td{padding:11px 11px; text-align:left; border-bottom:1px solid var(--line); white-space:nowrap}
th{font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:800; background:var(--panel2); position:sticky; top:0}
td.num,th.num{text-align:right; font-variant-numeric:tabular-nums}
tbody tr:hover td{background:rgba(11,20,38,.04)}
.rankcell{font-weight:900;font-size:15px;color:var(--gold)}

/* ---------- Awaiting ---------- */
.await{border:1px dashed var(--line2); border-radius:var(--radius-s); padding:15px;
  background:repeating-linear-gradient(45deg,transparent,transparent 11px,rgba(255,255,255,.018) 11px,rgba(255,255,255,.018) 22px)}
.await .h{display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px;color:var(--gold)}
.await p{margin:7px 0 0;font-size:12.5px;color:var(--muted)}

/* ---------- Bracket ---------- */
.bracket{display:flex; gap:20px; overflow-x:auto; padding:10px 2px 18px}
.bcol{display:flex; flex-direction:column; gap:14px; min-width:224px; justify-content:space-around}
.bcol h4{font-size:10.5px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);margin:0 0 2px;text-align:center;font-weight:800}
.bnode{background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1.5px solid var(--line); border-radius:13px; padding:9px 10px; font-size:12px; transition:.15s}
.bnode:hover{border-color:var(--line2)}
.bnode .bt{display:flex;align-items:center;gap:8px;padding:4px 0}
.bnode .bt .sc{margin-left:auto;font-weight:900}
.bnode.confirmed{border-color:rgba(34,224,122,.55); box-shadow:0 0 0 1px rgba(34,224,122,.12)}
.bnode.predicted{border-style:dashed;border-color:rgba(59,130,246,.65)}
.bnode.pending{opacity:.55}
.bnode.champ{border-color:var(--gold); box-shadow:0 0 0 1px rgba(255,194,60,.4),0 8px 24px rgba(255,194,60,.14)}
.bmeta{font-size:9.5px;color:var(--faint);margin-top:6px;border-top:1px solid var(--line);padding-top:6px;display:flex;justify-content:space-between;gap:6px}
.qual{border-radius:4px;padding:0 4px}
.qual.green{box-shadow:inset 0 0 0 1.5px rgba(34,224,122,.6)}
.qual.gold{box-shadow:inset 0 0 0 1.5px var(--gold)}
.elim{opacity:.4}.elim .tn,.elim .tc{text-decoration:line-through}
.legend{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--muted);margin:4px 0 10px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.swatch{width:24px;height:13px;border-radius:5px;border:1px solid var(--line2)}
.swatch.g{border:1.5px solid rgba(34,224,122,.7)} .swatch.b{border:1.5px dashed rgba(59,130,246,.75)}
.swatch.e{opacity:.4;background:var(--line)} .swatch.p{opacity:.55} .swatch.au{border:1.5px solid var(--gold)}

/* ---------- charts ---------- */
.barrow{display:grid;grid-template-columns:150px 1fr 46px;gap:10px;align-items:center;margin:7px 0;font-size:12.5px}
.bartrack{height:16px;background:var(--line);border-radius:999px;overflow:hidden}
.barfill{height:100%;border-radius:999px;background:var(--grad);transition:width .6s}
.barfill.gold{background:var(--grad-gold)}
.factor{margin:9px 0}
.factor .fh{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;gap:8px}
.factor .ft{height:11px;background:var(--line);border-radius:999px;overflow:hidden}
.factor .ff{height:100%;border-radius:999px}
.pill{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;border:1px solid var(--line2)}
.pill.on{color:var(--green);border-color:rgba(34,224,122,.45);background:rgba(34,224,122,.09)}
.pill.est{color:var(--purple);border-color:rgba(139,92,246,.45);background:rgba(139,92,246,.1)}
.conf-h{color:var(--green);font-weight:800} .conf-m{color:var(--gold);font-weight:800} .conf-l{color:var(--orange);font-weight:800}
.backlink{display:inline-flex;gap:6px;align-items:center;font-size:12.5px;color:var(--muted);margin:6px 0 10px;cursor:pointer}
.backlink:hover{color:var(--ink)}
.kv{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.kv:last-child{border-bottom:none} .kv .k{color:var(--muted)}
.disclaimer{font-size:11.5px;color:var(--faint);border-left:3px solid var(--purple);padding:3px 0 3px 11px;margin:9px 0;background:rgba(139,92,246,.05)}
.why-btn{border:1px solid var(--line2);background:transparent;color:var(--teal);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800;margin-top:10px}
.why-btn:hover{background:rgba(0,224,168,.08)}
footer{border-top:1px solid var(--line);margin-top:34px;padding:22px 0 44px;color:var(--muted);font-size:12px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.teamgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:11px}
.teamcard{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;transition:.16s}
.teamcard:hover{border-color:var(--teal);transform:translateY(-3px)}
.status-tag{font-size:9.5px;font-weight:900;padding:3px 8px;border-radius:999px;letter-spacing:.3px}
.tag-r16{background:rgba(34,224,122,.15);color:var(--green)}
.tag-today{background:rgba(255,194,60,.18);color:var(--gold)}
.tag-r32{background:rgba(255,90,106,.13);color:var(--red)}
.tag-group{background:rgba(91,107,136,.18);color:var(--muted)}
.timeline{list-style:none;margin:0;padding:0}
.timeline li{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.trend-up{color:var(--green);font-weight:900}.trend-flat{color:var(--muted)}.trend-warn{color:var(--gold)}
.hidden{display:none!important}
/* share + mobile */
.tb-actions{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.fab{position:fixed; right:16px; bottom:18px; width:58px; height:58px; border-radius:50%; border:none;
  background:var(--grad); color:#04140f; font-size:26px; box-shadow:0 12px 30px rgba(0,0,0,.5); z-index:60;
  display:none; cursor:pointer; animation:floaty 4s ease-in-out infinite}
.swipehint{display:none; text-align:center; font-size:11px; color:var(--faint); margin:2px 0 8px; letter-spacing:.5px}
.autobadge{display:inline-flex; align-items:center; gap:9px; font-size:12px; font-weight:700;
  padding:9px 15px; border-radius:999px; border:1px solid rgba(0,224,168,.4);
  background:rgba(0,224,168,.08); color:var(--teal); margin-bottom:14px}
.autobadge .lb{width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 1.7s infinite; flex:none}
.autobadge .ts{color:var(--muted); font-weight:600}
@media(max-width:860px){ .fab{display:grid; place-items:center} }
@media(max-width:560px){
  .brand h1{font-size:15px} .kpi .val{font-size:22px}
  .barrow{grid-template-columns:104px 1fr 40px} .tn{max-width:104px}
}
@media(max-width:640px){
  .wrap{padding:0 12px}
  .topbar .row{padding:10px 12px; gap:9px}
  .brand p{font-size:10.5px}
  .refresh-meta{display:none}
  .btn{padding:9px 12px; font-size:12px}
  .feedpill{padding:7px 10px; font-size:11px}
  .panel{padding:14px}
  .section-h{margin:18px 0 10px}
  .section-h h2{font-size:15px}
  .hero .inner{padding:22px 16px; gap:16px}
  th,td{padding:9px 8px}
  .swipehint{display:block}
  .fab{width:54px; height:54px; bottom:16px; right:14px}
  .filters input.search{min-width:100%}
  .filters select{flex:1}
}

function stageChip(m){const cls=m.st==="FINAL"?"big":(m.st==="QF"||m.st==="SF"||m.st==="3RD"?"ko":"");return '<span class="stage-chip '+cls+'">'+STAGE_LABEL[m.st]+(m.num?" · #"+m.num:"")+'</span>';}

function awaiting(t,b){return '<div class="await"><div class="h">⧗ '+esc(t)+'</div><p>'+esc(b)+'</p></div>';}
function probMini(m){const known=m.a&&m.b;
  if(!known)return '<div class="await small"><div class="h">◔ Prediction pending teams</div><p>Both sides must be confirmed before the model estimates this tie.</p></div>';
  const e=estimate(m.a,m.b,m.st!=="GROUP");
  if(e.mode==="advance"){const pa=Math.round(e.a*100),pb=100-pa;
    return '<div class="prob-mini"><i style="width:'+pa+'%;background:var(--teal)"></i><i style="width:'+pb+'%;background:var(--blue)"></i></div>'
      +'<div class="prob-legend"><span>'+esc(teamName(m.a))+' <b style="color:var(--teal)">'+pa+'%</b></span><span class="est-tag">MODEL EST · advance</span><span><b style="color:#7fb0ff">'+pb+'%</b> '+esc(teamName(m.b))+'</span></div>';}
  const pa=Math.round(e.a*100),pd=Math.round(e.draw*100),pb=100-pa-pd;
  return '<div class="prob-mini"><i style="width:'+pa+'%;background:var(--teal)"></i><i style="width:'+pd+'%;background:var(--grey)"></i><i style="width:'+pb+'%;background:var(--blue)"></i></div>'
    +'<div class="prob-legend"><span>'+pa+'% W</span><span>'+pd+'% D</span><span>'+pb+'% W</span></div>';}

function filterBar(){

  h+='<select id="fteam"><option value="All">All teams</option>'+teams.map(c=>'<option value="'+c+'"'+(STATE.team===c?" selected":"")+'>'+esc(teamName(c))+'</option>').join("")+'</select>';

function matchMatchesFilters(m){
  if(STATE.stage!=="All"){const map={"Round of 32":"R32","Round of 16":"R16","Quarter-finals":"QF","Semi-finals":"SF","Final":"FINAL","Group Stage":"GROUP"};
    if(map[STATE.stage]&&m.st!==map[STATE.stage])return false;}
  if(STATE.team!=="All"&&m.a!==STATE.team&&m.b!==STATE.team)return false;
  if(STATE.venue!=="All"&&m.ven!==STATE.venue)return false;
  if(STATE.live&&m.status!=="LIVE")return false;
  if(STATE.q){const q=STATE.q.toLowerCase();
    const hay=[feederLabel(m,"a"),feederLabel(m,"b"),m.a,m.b,m.ven?VEN[m.ven].fifa:"",m.ven?VEN[m.ven].city:"",m.ven?VEN[m.ven].name:"",m.num?("#"+m.num):"",STAGE_LABEL[m.st]].join(" ").toLowerCase();
    if(hay.indexOf(q)<0)return false;}
  return true;}
function applyFilters(){const fb=$("#filterBar");if(!fb)return;const b=(id,ev,fn)=>{const el=$("#"+id);if(el)el.addEventListener(ev,fn);};
  b("fq","input",e=>{STATE.q=e.target.value;refilter();});

function factorBreakdown(a,b){const sa=factorScores(a),sb=factorScores(b);let h='';
  FACTORS_UI().forEach(f=>{const va=sa[f.key],vb=sb[f.key],tot=va+vb||1,pa=Math.round(va/tot*100);

      +'<div class="ft"><div class="ff" style="width:'+pa+'%;background:var(--teal)"></div></div>'
      +'<div class="small faint" style="margin-top:3px">'+esc(f.desc)+'</div></div>';});
  h+='<div class="disclaimer">Weighted blend: WC-2026 performance 35% (verified results) · recent form 25% · World-Cup history 15% · team strength 15% · player availability 10%. History &amp; strength use disclosed public inputs; connect live feeds to refine. Output is a <b>model estimate</b>, not an official FIFA prediction.</div>';
  return h;}
function FACTORS_UI(){return [
  {key:"wc",label:"WC 2026 performance",w:.35,connected:true,desc:"Round reached, knockout wins & goal difference (verified results)."},
  {key:"form",label:"Recent competitive form",w:.25,connected:false,desc:"Tournament momentum + baseline strength (model estimate)."},
  {key:"hist",label:"Historical World Cup record",w:.15,connected:false,desc:"Public World Cup pedigree (titles, deep runs)."},
  {key:"tier",label:"Team strength (ranking/Elo tier)",w:.15,connected:false,desc:"Pre-tournament strength tier — disclosed model input."},
  {key:"avail",label:"Player availability & star impact",w:.10,connected:false,desc:"Marquee-player impact from cited coverage; connect squad news to refine."}];}

/* ---------------------- BRACKET ------------------------------------------- */
function bracketLegend(){return '<div class="legend"><span><span class="swatch g"></span>Confirmed / qualified</span><span><span class="swatch b"></span>Predicted</span><span><span class="swatch e"></span>Eliminated</span><span><span class="swatch p"></span>Pending</span><span><span class="swatch au"></span>Champion favourite &amp; path</span></div>';}
function bracketRow(m,side,favCode){const c=side==="a"?m.a:m.b;const sc=m.sc?(side==="a"?m.sc[0]:m.sc[1]):null,other=m.sc?(side==="a"?m.sc[1]:m.sc[0]):null;
  let win=false;if(m.sc){win=sc>other;if(m.pens){const pa=side==="a"?m.pens[0]:m.pens[1],pb=side==="a"?m.pens[1]:m.pens[0];win=pa>pb;}}
  const elim=c&&T[c]&&(T[c].r==="R32"||T[c].r==="GROUP")&&m.status==="FT"&&!win;
  const isFav=c&&c===favCode;
  const qcls=c&&T[c]&&(T[c].r==="R16")?"qual green":(isFav?"qual gold":"");
  let inner=c?'<span class="'+qcls+'">'+teamBadge(c,{map:false,fw:22,fh:15})+'</span>':'<span class="tbadge"><span class="flag ph" style="width:22px;height:15px"></span><span class="tn faint">'+esc(side==="a"?m.af:m.bf)+'</span></span>';
  return '<div class="bt '+(elim?"elim":"")+'">'+inner+(sc!=null?'<span class="sc">'+sc+(m.pens?" ("+(side==="a"?m.pens[0]:m.pens[1])+"p)":"")+'</span>':"")+'</div>';}
function bracketNode(m,favCode){const cls=[];if(m.status==="FT")cls.push("confirmed");else if(!(m.a&&m.b))cls.push("pending");
  if((m.a&&m.a===favCode)||(m.b&&m.b===favCode))cls.push("champ");
  const v=m.ven?VEN[m.ven].city:"TBC";
  return '<div class="bnode '+cls.join(" ")+'">'+bracketRow(m,"a",favCode)+bracketRow(m,"b",favCode)
    +'<div class="bmeta"><span>'+bracketWhen(m)+'</span><span>'+esc(v)+'</span></div></div>';}
/* compact Qatar-time "D Mon · HH:MM QT" for bracket nodes (date + time) */
function bracketWhen(m){var dt=qatarDateOf(m);var p=/(\d{4})-(\d{2})-(\d{2})/.exec(dt);var ds=p?(+p[3])+" "+MON[+p[2]-1].slice(0,3):dt;return ds+(m.koUTC?" · "+qatarShort(m.koUTC)+" QT":"");}
function bracketMarkup(favCode){let h='<div class="bracket">';
  [["R32","Round of 32"],["R16","Round of 16"],["QF","Quarter-finals"],["SF","Semi-finals"],["FINAL","Final"]].forEach(pair=>{
    h+='<div class="bcol"><h4>'+pair[1]+'</h4>';
    M.filter(m=>m.st===pair[0]).forEach(m=>{h+=bracketNode(m,favCode);});
    if(pair[0]==="FINAL"){const tp=M.find(x=>x.st==="3RD");if(tp)h+='<h4 style="margin-top:12px">Third place</h4>'+bracketNode(tp,favCode);}
    h+='</div>';});
  return h+'</div>';}
function renderBracket(){const fav=favorite();
  let h='<div class="section-h"><h2><span class="ic">🗺️</span>Knockout bracket</h2><span class="small muted">Round of 32 → Final · Qatar time</span></div>';
  h+='<div class="panel pitch">'+bracketLegend()+'<div class="swipehint">⇠ swipe the bracket ⇢</div>'+bracketMarkup(fav?fav.c:null)+'</div>';
  h+='<div class="disclaimer">Round-of-32 results and Round-of-16 / quarter-final matchups are confirmed &amp; sourced (FIFA, ESPN). Semi-final onward show expected slots; teams populate as ties resolve. Gold marks the model champion favourite ('+(fav?esc(teamName(fav.c))+" · "+Math.round(fav.w*100)+"% est.":"—")+') and its path. Kick-off times from the semi-finals are TBC until FIFA confirms.</div>';

function pctCell(p){return Math.round(p*100)+"%";}
function championChart(list){const max=list.length?Math.max.apply(null,list.map(o=>o.w)):1;
  return '<div style="margin-top:8px">'+list.map((o,i)=>{const pct=Math.round(o.w*100),w=Math.round(o.w/(max||1)*100);

let autoTimer=null;

  $("#feedText").textContent={live:"Live feed",delayed:"Delayed",failed:"Feed failed",manual:"Manual · Snapshot"}[health];
  $("#feedPill").title="Active provider: "+Registry.active.name;}
function doRefresh(){const now=new Date();$("#refreshMeta").textContent="Last refreshed "+pad((now.getUTCHours()+3)%24)+":"+pad(now.getUTCMinutes())+" QT";updateFeedUI();manageAuto();}
function manageAuto(){const anyLive=M.some(m=>m.status==="LIVE");
  if(anyLive&&Registry.active.health()==="live"){if(!autoTimer)autoTimer=setInterval(doRefresh,45000);}else if(autoTimer){clearInterval(autoTimer);autoTimer=null;}}

function shareText(){
  const up=upcoming()[0],todays=M.filter(isToday).length,fav=favorite();
  const L=["🏆 *FIFA World Cup 2026* — all times in Qatar time (UTC+3)"];
  if(up)L.push("⏱️ Next: "+feederLabel(up,"a")+" v "+feederLabel(up,"b")+(up.koUTC?(" · "+qatarShort(up.koUTC)+" QT"):""));
  L.push("🔥 Today: "+todays+" match"+(todays===1?"":"es")+" (Qatar time)");
  L.push("🥇 Golden Boot: L. Messi leads the race (FIFA)");
  if(fav)L.push("📈 Model pick: "+teamName(fav.c)+" ~"+Math.round(fav.w*100)+"% to win (model estimate)");
  L.push("📊 Sources: FIFA + ESPN · 3 Jul 2026");
  if(/^https?:/.test(location.href))L.push(location.href);
  return L.join("\n");
}
async function doShare(){
  const text=shareText(),url=/^https?:/.test(location.href)?location.href:undefined;
  if(navigator.share){ try{ await navigator.share({title:"FIFA World Cup 2026",text,url}); return; }catch(e){ if(e&&e.name==="AbortError")return; } }
  window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank","noopener");
}
function renderFooter(){const srcs=Object.keys(SRC).map(k=>srcChip(k)).join(" ");
  $("#footer").innerHTML='<div class="autobadge"><span class="lb"></span>🔄 Auto-updates via GitHub Actions + football-data.org<span class="ts">· last refreshed '+esc(qatarStamp(SNAPSHOT_AT))+'</span></div>'
    +'<div class="section-h"><h2 style="font-size:14px"><span class="ic">🔒</span>Data sources &amp; integrity</h2></div><div class="chip-row">'+srcs+'</div>'
    +'<p style="margin-top:12px;max-width:860px">This planner shows a <b>verified snapshot</b> from official FIFA and reputable coverage (ESPN), 3 July 2026 — every fixture, result, venue and team status cited above with a timestamp. '
    +'Win &amp; champion probabilities are computed by a transparent 5-factor model and clearly labelled <b>model estimates</b>, not official FIFA predictions. Live match data (line-ups, xG, possession, cards, subs, VAR, per-player stats) and exact goal tallies show <b>“not available yet / live feed unavailable”</b> until a licensed provider is connected. '
    +'A provider abstraction layer supports Sportradar, Opta / Stats Perform, API-Football and Sportmonks — no site is scraped against its terms. Country locators use real geographic coordinates.</p>'
    +'<p class="faint small" style="margin-top:8px">All times in Qatar time (Asia/Qatar, UTC+03:00). Snapshot compiled '+esc(qatarStamp(SNAPSHOT_AT))+'.</p>';}

/* ============================================================================
   EVENTS + BOOT
   ========================================================================== */
document.addEventListener("click",e=>{
  const why=e.target.closest('[data-action="why"]');
  if(why){const box=$("#whybox");if(box){box.classList.toggle("hidden");why.textContent=(box.classList.contains("hidden")?"▸":"▾")+" Why this probability?";}return;}
  const tm=e.target.closest("[data-team]");if(tm){go("team",tm.getAttribute("data-team"));return;}
  const mid=e.target.closest("[data-mid]");if(mid){go("match",mid.getAttribute("data-mid"));return;}
  const nav=e.target.closest("[data-route]");if(nav){go(nav.getAttribute("data-route"));e.preventDefault();return;}
});
$("#refreshBtn").addEventListener("click",doRefresh);
$("#shareBtn").addEventListener("click",doShare);
var _fab=$("#fabShare");if(_fab)_fab.addEventListener("click",doShare);
window.addEventListener("hashchange",()=>{render();window.scrollTo(0,0);});
championSim();updateFeedUI();doRefresh();renderFooter();render();
</script>
